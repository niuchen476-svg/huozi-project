name: Validate pull request

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Check synchronized level data
        run: npm run check-data

      - name: Run interaction and AI contract tests
        run: |
          npm run test:source-drawer
          npm run test:huining
          npm run test:expression
          npm run test:artwork
          npm run test:artwork-panel
          npm run test:fragment-viewer

      - name: Build GitHub Pages bundle
        run: npm run build:pages
